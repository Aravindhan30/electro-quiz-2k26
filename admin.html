<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Quiz Admin | TECH TONIC 2K26</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --dark: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(212, 175, 55, 0.15);
            --success: #4CAF50;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 50%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
                linear-gradient(135deg, #030305 0%, #0a0a12 50%, #050507 100%);
            z-index: -2;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #111, #0a0a0a);
            border-bottom: 2px solid var(--gold);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .header h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: clamp(14px, 4vw, 22px);
            letter-spacing: 3px;
        }

        .header p {
            font-size: 12px;
            color: #888;
            margin-top: 3px;
        }

        /* Login */
        .login-section {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            max-width: 400px;
            margin: 40px auto;
        }

        .login-section input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            text-align: center;
        }

        .login-section input:focus {
            border-color: var(--gold);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            background: linear-gradient(135deg, var(--gold), #c9a020);
            color: #000;
            font-weight: 700;
            font-size: 15px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
        }

        /* Main Content */
        .admin-content {
            display: none;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 15px 60px;
        }

        .admin-content.visible {
            display: block;
        }

        /* Round Control */
        .round-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .round-btn {
            flex: 1;
            min-width: 120px;
            padding: 14px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            color: #aaa;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .round-btn:hover {
            border-color: rgba(212, 175, 55, 0.4);
            color: #fff;
        }

        .round-btn.active {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 8px 18px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #888;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .filter-tab.active {
            background: rgba(212, 175, 55, 0.12);
            border-color: rgba(212, 175, 55, 0.3);
            color: var(--gold);
        }

        /* Leaderboard */
        .section-title {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: clamp(1rem, 3vw, 1.3rem);
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 6px;
        }

        .leaderboard-table th {
            text-align: left;
            padding: 10px 14px;
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .leaderboard-table td {
            padding: 14px;
            background: var(--card-bg);
            font-size: 0.88rem;
            color: #ccc;
        }

        .leaderboard-table tr td:first-child {
            border-radius: 12px 0 0 12px;
        }

        .leaderboard-table tr td:last-child {
            border-radius: 0 12px 12px 0;
        }

        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            background: rgba(255, 255, 255, 0.06);
            color: #888;
        }

        .rank-1 {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
        }

        .rank-2 {
            background: rgba(192, 192, 192, 0.2);
            color: #c0c0c0;
        }

        .rank-3 {
            background: rgba(205, 127, 50, 0.2);
            color: #cd7f32;
        }

        .team-name {
            font-weight: 600;
            color: #e0e0e0;
        }

        .score-cell {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            color: var(--gold);
        }

        .btn-winner {
            padding: 6px 14px;
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 8px;
            background: rgba(76, 175, 80, 0.1);
            color: var(--success);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .btn-winner:hover {
            background: var(--success);
            color: #fff;
        }

        .btn-winner.selected {
            background: var(--success);
            color: #fff;
            border-color: var(--success);
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #555;
        }

        .empty-state .icon {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 0.85rem;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 18px;
            text-align: center;
        }

        .stat-card .number {
            font-family: 'Orbitron', monospace;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--gold);
        }

        .stat-card .label {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        /* Refresh & PDF buttons */
        .btn-refresh,
        .btn-pdf {
            padding: 8px 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            background: rgba(212, 175, 55, 0.08);
            color: var(--gold);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .btn-refresh:hover,
        .btn-pdf:hover {
            background: var(--gold);
            color: #000;
        }

        .btn-pdf {
            border-color: rgba(76, 175, 80, 0.3);
            background: rgba(76, 175, 80, 0.08);
            color: var(--success);
        }

        .btn-pdf:hover {
            background: var(--success);
            color: #fff;
        }

        .page-footer {
            text-align: center;
            padding: 20px;
            color: #444;
            font-size: 12px;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 14px 28px;
            border-radius: 14px;
            font-size: 0.9rem;
            z-index: 9999;
            transition: transform 0.4s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: rgba(76, 175, 80, 0.9);
            color: #fff;
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.9);
            color: #fff;
        }

        .toast.info {
            background: rgba(212, 175, 55, 0.9);
            color: #000;
        }

        @media(max-width:480px) {
            .header {
                padding: 15px;
            }

            .header h1 {
                font-size: 15px;
                letter-spacing: 2px;
            }

            .leaderboard-table th {
                font-size: 0.65rem;
                padding: 8px 10px;
            }

            .leaderboard-table td {
                padding: 10px;
                font-size: 0.8rem;
            }

            .rank-badge {
                width: 26px;
                height: 26px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>⚡ QUIZ ADMIN PANEL</h1>
        <p>TECH TONIC 2K26 — Electro Quiz Management</p>
    </div>

    <!-- Login -->
    <div id="loginSection" class="login-section">
        <h3 style="font-family:'Cinzel',serif;color:var(--gold);letter-spacing:2px;font-size:1.1rem">🔐 Admin Login</h3>
        <input type="password" id="adminKey" placeholder="Enter Admin Key"
            onkeydown="if(event.key==='Enter')adminLogin()">
        <button class="btn-login" onclick="adminLogin()">Access Panel</button>
    </div>

    <!-- Admin Content -->
    <div id="adminContent" class="admin-content">

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="number" id="totalTeams">0</div>
                <div class="label">Total Teams</div>
            </div>
            <div class="stat-card">
                <div class="number" id="avgScore">0</div>
                <div class="label">Avg Score %</div>
            </div>
            <div class="stat-card">
                <div class="number" id="topScore">0</div>
                <div class="label">Top Score</div>
            </div>
        </div>

        <!-- Round Filter -->
        <div
            style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:15px">
            <h2 class="section-title" style="margin:0">🏆 Leaderboard</h2>
            <div style="display:flex;gap:8px">
                <button class="btn-refresh" onclick="refreshData()">↻ Refresh</button>
                <button class="btn-pdf" onclick="generatePDF()">📄 Download PDF</button>
            </div>
        </div>

        <div class="filter-tabs">
            <button class="filter-tab active" onclick="filterRound(0, this)">All Rounds</button>
            <button class="filter-tab" onclick="filterRound(1, this)">Round 1</button>
            <button class="filter-tab" onclick="filterRound(2, this)">R2 Set 1</button>
            <button class="filter-tab" onclick="filterRound(3, this)">R2 Set 2</button>
        </div>

        <div id="leaderboardContainer">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Team</th>
                        <th>Round</th>
                        <th>Score</th>
                        <th>Time</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody"></tbody>
            </table>
            <div id="emptyState" class="empty-state">
                <div class="icon">📋</div>
                <p>No quiz submissions yet</p>
            </div>
        </div>

    </div>

    <div id="toast" class="toast"></div>
    <div class="page-footer">TECH TONIC 2K26 — Department of ECE</div>

    <!-- jsPDF for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js"></script>

    <script>
        // Config
        const ADMIN_KEY = 'TT26_ADMIN_123';

        // ── Google Apps Script Backend URL — PASTE YOUR DEPLOYED URL HERE ──
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxVdQByrqrBqpvcPvcvfb5pnJMtVzRHFeRfAyWWwKsf3lWvvRXp0Tt2RSS7a6oNcNfl4w/exec';

        // Results storage — populated from Apps Script backend
        let allResults = [];

        // Round display names
        const ROUND_NAMES = { 1: 'R1', 2: 'R2-S1', 3: 'R2-S2' };

        let currentFilter = 0;

        function showToast(msg, type = 'info') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = `toast ${type} show`;
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function adminLogin() {
            const key = document.getElementById('adminKey').value.trim();
            if (key === ADMIN_KEY) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminContent').classList.add('visible');
                showToast('Welcome, Admin!', 'success');
                refreshData();
            } else {
                showToast('Invalid admin key', 'error');
            }
        }

        function refreshData() {
            if (!SCRIPT_URL || SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL') {
                showToast('Backend URL not configured', 'error');
                renderLeaderboard();
                return;
            }

            showToast('Loading data...', 'info');
            const url = `${SCRIPT_URL}?action=getLeaderboard&key=${ADMIN_KEY}&round=${currentFilter}`;
            fetch(url)
                .then(r => r.json())
                .then(data => {
                    allResults = [];
                    if (Array.isArray(data)) {
                        allResults = data;
                    }
                    showToast(`Loaded ${allResults.length} submissions`, 'success');
                    renderLeaderboard();
                })
                .catch(() => {
                    showToast('Failed to fetch data', 'error');
                    renderLeaderboard();
                });
        }

        function filterRound(round, btn) {
            currentFilter = round;
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            renderLeaderboard();
        }

        function renderLeaderboard() {
            let data = currentFilter === 0 ? [...allResults] : allResults.filter(r => r.round === currentFilter);
            data.sort((a, b) => b.score - a.score || a.time - b.time);

            // Stats
            document.getElementById('totalTeams').textContent = data.length;
            if (data.length > 0) {
                const avg = Math.round(data.reduce((s, r) => s + (r.score / r.total) * 100, 0) / data.length);
                document.getElementById('avgScore').textContent = avg + '%';
                document.getElementById('topScore').textContent = data[0].score + '/' + data[0].total;
            } else {
                document.getElementById('avgScore').textContent = '—';
                document.getElementById('topScore').textContent = '—';
            }

            const tbody = document.getElementById('leaderboardBody');
            const empty = document.getElementById('emptyState');

            if (data.length === 0) {
                tbody.innerHTML = '';
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            tbody.innerHTML = data.map((r, i) => {
                const rank = i + 1;
                const rankClass = rank <= 3 ? `rank-${rank}` : '';
                const medals = ['🥇', '🥈', '🥉'];
                const medal = rank <= 3 ? medals[rank - 1] : rank;
                const m = Math.floor(r.time / 60);
                const s = r.time % 60;
                const idx = allResults.indexOf(r);

                return `<tr>
          <td><span class="rank-badge ${rankClass}">${medal}</span></td>
          <td><span class="team-name">${r.team}</span></td>
          <td><span style="font-size:0.75rem;color:var(--gold)">${ROUND_NAMES[r.round] || 'R' + r.round}</span></td>
          <td><span class="score-cell">${r.score}/${r.total}</span></td>
          <td style="font-size:0.8rem;color:#888">${m}m ${s}s</td>
          <td><button class="btn-winner ${r.winner ? 'selected' : ''}" onclick="toggleWinner(${idx})">${r.winner ? '🏆 Winner' : 'Select'}</button></td>
        </tr>`;
            }).join('');
        }

        function toggleWinner(idx) {
            const r = allResults[idx];
            r.winner = !r.winner;
            const team = r.team;

            if (r.winner) {
                showToast(`🏆 ${team} marked as winner!`, 'success');
            } else {
                showToast(`${team} unmarked`, 'info');
            }

            // Save winner status via Apps Script
            if (SCRIPT_URL && SCRIPT_URL !== 'YOUR_APPS_SCRIPT_URL') {
                fetch(`${SCRIPT_URL}?action=selectWinner&team=${encodeURIComponent(team)}&round=${r.round}&key=${ADMIN_KEY}`)
                    .catch(() => { });
            }

            renderLeaderboard();
        }

        // ═══════════════════════════════════════════
        //   PDF REPORT GENERATION
        // ═══════════════════════════════════════════
        function generatePDF() {
            if (allResults.length === 0) {
                showToast('No data to generate report', 'error');
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const pageW = doc.internal.pageSize.getWidth();
            const pageH = doc.internal.pageSize.getHeight();
            const margin = 15;

            // Colors
            const gold = [212, 175, 55];
            const darkBg = [15, 15, 20];
            const cardBg = [25, 25, 35];
            const white = [255, 255, 255];
            const gray = [150, 150, 150];
            const green = [76, 175, 80];

            // Filter data same as current view
            let data = currentFilter === 0 ? [...allResults] : allResults.filter(r => r.round === currentFilter);
            data.sort((a, b) => b.score - a.score || a.time - b.time);

            const filterNames = { 0: 'All Rounds', 1: 'Round 1', 2: 'R2 Set 1', 3: 'R2 Set 2' };
            const filterLabel = filterNames[currentFilter] || 'All Rounds';

            // ─── Dark Background ───
            doc.setFillColor(...darkBg);
            doc.rect(0, 0, pageW, pageH, 'F');

            // ─── Header Gold Bar ───
            doc.setFillColor(...gold);
            doc.rect(0, 0, pageW, 2, 'F');

            // ─── Title ───
            let y = 18;
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(22);
            doc.setTextColor(...gold);
            doc.text('TECH TONIC 2K26', pageW / 2, y, { align: 'center' });

            y += 8;
            doc.setFontSize(11);
            doc.setTextColor(...gray);
            doc.text('Electro Quiz — Official Report', pageW / 2, y, { align: 'center' });

            // ─── Divider ───
            y += 6;
            doc.setDrawColor(...gold);
            doc.setLineWidth(0.5);
            doc.line(margin, y, pageW - margin, y);

            // ─── Report Meta ───
            y += 8;
            doc.setFontSize(9);
            doc.setTextColor(...gray);
            const now = new Date();
            doc.text(`Generated: ${now.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' })} at ${now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })}`, margin, y);
            doc.text(`Filter: ${filterLabel}`, pageW - margin, y, { align: 'right' });

            // ─── Stats Cards ───
            y += 10;
            const cardW = (pageW - margin * 2 - 12) / 3;
            const cardH = 22;

            const totalTeams = data.length;
            const avgScore = data.length > 0 ? Math.round(data.reduce((s, r) => s + (r.score / r.total) * 100, 0) / data.length) + '%' : '—';
            const topScore = data.length > 0 ? data[0].score + '/' + data[0].total : '—';

            const stats = [
                { label: 'Total Teams', value: String(totalTeams) },
                { label: 'Avg Score', value: avgScore },
                { label: 'Top Score', value: topScore }
            ];

            stats.forEach((stat, i) => {
                const x = margin + i * (cardW + 6);
                doc.setFillColor(...cardBg);
                doc.roundedRect(x, y, cardW, cardH, 3, 3, 'F');
                doc.setDrawColor(gold[0], gold[1], gold[2]);
                doc.setLineWidth(0.3);
                doc.roundedRect(x, y, cardW, cardH, 3, 3, 'S');

                doc.setFont('helvetica', 'bold');
                doc.setFontSize(14);
                doc.setTextColor(...gold);
                doc.text(stat.value, x + cardW / 2, y + 10, { align: 'center' });

                doc.setFont('helvetica', 'normal');
                doc.setFontSize(7);
                doc.setTextColor(...gray);
                doc.text(stat.label.toUpperCase(), x + cardW / 2, y + 17, { align: 'center' });
            });

            // ─── Leaderboard Title ───
            y += cardH + 12;
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(13);
            doc.setTextColor(...gold);
            doc.text('LEADERBOARD', margin, y);

            y += 3;

            // ─── Table ───
            const medals = ['1st', '2nd', '3rd'];
            const tableBody = data.map((r, i) => {
                const rank = i + 1;
                const rankLabel = rank <= 3 ? medals[rank - 1] : String(rank);
                const m = Math.floor(r.time / 60);
                const s = r.time % 60;
                const roundName = ROUND_NAMES[r.round] || 'R' + r.round;
                const winner = r.winner ? 'YES' : '';
                return [rankLabel, r.team, roundName, `${r.score}/${r.total}`, `${m}m ${s}s`, winner];
            });

            doc.autoTable({
                startY: y,
                head: [['#', 'Team', 'Round', 'Score', 'Time', 'Winner']],
                body: tableBody,
                margin: { left: margin, right: margin },
                theme: 'plain',
                styles: {
                    font: 'helvetica',
                    fontSize: 9,
                    textColor: [200, 200, 200],
                    cellPadding: { top: 4, bottom: 4, left: 5, right: 5 },
                    lineWidth: 0,
                    fillColor: false
                },
                headStyles: {
                    fontSize: 7,
                    textColor: [...gray],
                    fontStyle: 'bold',
                    fillColor: false,
                    cellPadding: { top: 3, bottom: 3, left: 5, right: 5 }
                },
                alternateRowStyles: {
                    fillColor: [...cardBg]
                },
                columnStyles: {
                    0: { halign: 'center', cellWidth: 15 },
                    2: { halign: 'center', cellWidth: 22 },
                    3: { halign: 'center', fontStyle: 'bold', textColor: [...gold] },
                    4: { halign: 'center', cellWidth: 22 },
                    5: { halign: 'center', cellWidth: 20, textColor: [...green] }
                },
                didParseCell: function (hookData) {
                    if (hookData.column.index === 0 && hookData.section === 'body') {
                        const val = hookData.cell.raw;
                        if (val === '1st') hookData.cell.styles.textColor = [255, 215, 0];
                        else if (val === '2nd') hookData.cell.styles.textColor = [192, 192, 192];
                        else if (val === '3rd') hookData.cell.styles.textColor = [205, 127, 50];
                    }
                },
                didDrawPage: function (hookData) {
                    // Dark background on new pages
                    const pg = hookData.pageNumber;
                    doc.setFillColor(...darkBg);
                    doc.rect(0, 0, pageW, pageH, 'F');
                }
            });

            // ─── Footer on every page ───
            const totalPages = doc.internal.getNumberOfPages();
            for (let p = 1; p <= totalPages; p++) {
                doc.setPage(p);
                doc.setDrawColor(...gold);
                doc.setLineWidth(0.3);
                doc.line(margin, pageH - 12, pageW - margin, pageH - 12);
                doc.setFontSize(7);
                doc.setTextColor(...gray);
                doc.text('TECH TONIC 2K26 — Department of ECE', margin, pageH - 7);
                doc.text(`Page ${p} of ${totalPages}`, pageW - margin, pageH - 7, { align: 'right' });
            }

            // ─── Save ───
            const fname = `Quiz_Report_${filterLabel.replace(/\s+/g, '_')}_${now.toISOString().slice(0, 10)}.pdf`;
            doc.save(fname);
            showToast('PDF report downloaded!', 'success');
        }
    </script>
</body>

</html>
